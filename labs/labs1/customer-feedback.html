<html>  

<head>
    <title>Customer Feedback</title>
</head>

<body>
<h1>Customer Feedback Survey</h1>
<em style="color: blue">Please provide your feedback below: </em><br><br>

<fieldset>
    <legend>Customer Information</legend><br>

        <label for="name">Full Name<span style="color: red">*</span></label><br>
        <input type="text" placeholder="Enter your name" title="Name" id="name" name="name" required><br><br>

        <label for="email">Email Address<span style="color: red">*</span></label><br>
        <input type="email" placeholder="your.email@example.com" id="email" name="email" required><br><br>

        <label for="tel">Phone Number</label><br>
        <input type="tel" placeholder="+66-xxx-xxx-xxx" id="phone" name="phone"><br><br>

        <label for="customer id">Customer ID</label><br> 
        <input type="text" placeholder="Enter your customer ID" id="customer id" name="customer id"><br><br>

    
    </form>
</fieldset>

<fieldset>
    <legend>Service Evaluation</legend><br>

        <label for="service">How would you rate our service?<span style="color: red" required>*</span></label><br>
        <input type="radio" id="poor" name="service" value="poor">
        <label for="poor">1-Poor</label><br>
        <input type="radio" id="fair" name="service" value="fair">
        <label for="fair">2-Fair</label><br>
        <input type="radio" id="good" name="service" value="good">
        <label for="good">3-Good</label><br>
        <input type="radio" id="excellent" name="service" value="excellent">
        <label for="excellent">4-Very Good</label><br>
        <input type="radio" id="outstanding" name="service" value="outstanding">
        <label for="outstanding">5-Excellent</label><br><br>

        <label for="category">Service category<span style="color: red">*</span></label><br>
        <select id="category" name="category" required>
            <option value="">-- Please select --</option>
            <option value="product">Technical Support</option>
            <option value="service">Sales</option>
            <option value="pricing">Billing</option>
            <option value="pricing">General Inquiry</option>
        </select><br><br>

        <label for="recommend">Would you recommend our service to others?<span style="color: red">*</span></label><br>
        <input type="radio" id="yes" name="recommend" value="yes">
        <label for="yes">Yes</label><br>
        <input type="radio" id="maybe" name="recommend" value="maybe">
        <label for="maybe">Maybe</label><br>
        <input type="radio" id="no" name="recommend" value="no">
        <label for="no">No</label><br>
        </select><br>

    </form>
</fieldset>


<fieldset>
    <legend>Experience Details</legend><br>

        <label for="visitdate">Visit Date</label><br>
        <input type="date" id="visitdate" name="visitdate"><br><br>
        <label for="hear">How did you hear about us? (Select all that apply)</label><br>
        <input type="checkbox" id="socialmedia" name="hear" value="socialmedia">
        <label for="socialmedia">Social Media</label><br>
        <input type="checkbox" id="friend" name="hear" value="friend">
        <label for="friend">Friend/Family</label><br>
        <input type="checkbox" id="advertisement" name="hear" value="advertisement">
        <label for="advertisement">Advertisement</label><br>
        <input type="checkbox" id="other" name="hear" value="other">
        <label for="other">Other</label><br>
        <label for="comments">Additional Comments</label><br>
        <textarea name="comments" placeholder="Enter your comments here" id="comments" chars="10"></textarea><br><br> 

    </form>
</fieldset>

<fieldset>
    <legend>Contact Preferences</legend><br>
        <label for="contact">Preferred Contact Method</label><br>
        <input type="radio" id="emailcontact" name="contact" value="email">
        <label for="emailcontact">Email</label><br>
        <input type="radio" id="phonecontact" name="contact" value="phone">
        <label for="phonecontact">Phone</label><br>
        <input type="radio" id="Postal Mail" name="contact" value="postal">
        <label for="Postal Mail">Postal Mail</label><br><br
        <label for="contacttime">Best time to contact you</label><br>
        <select id="contacttime" name="contacttime">
            <option value="">-- Please select --</option>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
        </select><br><br>
    </form>
</fieldset>

<input type="checkbox">
<label for="terms">I agree to the terms and conditions</label><br><br>
<input type="submit" value="Submit Feedback">
<input type="reset" value="Reset Form">

</body>
</html>
